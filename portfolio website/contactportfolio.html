<section id="contact">

  <div class="container">

    <div class="section-title">
      <h2>Contact Me</h2>
    </div>

    <div class="row justify-content-center">

      <div class="col-md-8">

        <div class="contact-form">

          <form id="contactForm">

            <div class="mb-3">

              <input type="text"
              class="form-control"
              placeholder="Your Name"
              required>

            </div>

            <div class="mb-3">

              <input type="email"
              class="form-control"
              placeholder="Your Email"
              required>

            </div>

            <div class="mb-3">

              <textarea class="form-control"
              rows="5"
              placeholder="Your Message"></textarea>

            </div>

            <button type="submit"
            class="btn btn-custom">

              Send Message

            </button>

          </form>

        </div>

      </div>

    </div>

  </div>

</section>
